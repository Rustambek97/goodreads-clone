{% extends 'base.html' %}


{% block title %}
    profile edit
{% endblock %}


{% block main %}

    <div class="row justify-content-center">
        <div class="col-6">
            <h1>Edit Profile</h1>
            <div class="card">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">SAVE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
