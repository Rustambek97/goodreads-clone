{% extends 'base.html' %}


{% block title %}
    Profile
{% endblock %}

{% block main %}

    <div class="row">
        <div class="col-3">
            <img src="{{ user.picture.url }}" class="w-100" alt="">
        </div>
        <div class="col-8">
            <h1>{{ user.username }}</h1>
            <p>{{ user.email }}</p>
            <p>{{ user.first_name }}</p>
            <p>{{ user.last_name }}</p>
        </div>
        <div class="col-1">
            <a href="{% url 'profile_edit' %}" class="btn btn-primary">Edit Profile</a>
        </div>
    </div>

{% endblock %}
