<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title> {% block title %} {% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% block css %} {% endblock %}">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link active" href="{% url 'homepage' %}">Home</a>
        <a class="nav-link" href="{% url 'booklist' %}">Books</a>

        {% if user.is_authenticated %}
          <a href="{% url 'profile' %}" class="p-2"  > {{ user.username }} </a>
          <form action="{% url 'logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-info">logout</button>
          </form>
        {% else %}
          <a class="nav-link" href="{% url 'login' %}">login</a>
          <a class="nav-link" href="#">Register</a>
        {% endif %}

      </div>
    </div>
  </div>
</nav>

<div class="container">
    {% block main %}

    {% endblock %}
</div>




<footer>
    goodreads.com clone site
</footer> 
</body>

</html>
